<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock Paper Scissors</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <!-- DİL SEÇİMİ -->
  <div id="dil-secim" class="ekran">
    <h2>Select Language</h2>
    <div id="dil-liste"></div>
  </div>

  <!-- MOD SEÇİMİ -->
  <div id="mod-secim" class="ekran" style="display:none">
    <h2 id="mod-baslik">Game Mode</h2>
    <button class="dil-btn tam-btn" onclick="modSec('ai')">🤖 VS AI</button>
    <button class="dil-btn tam-btn" onclick="modSec('2p')">👥 2 Players</button>
  </div>

  <!-- AYARLAR -->
  <div id="ayarlar-secim" class="ekran" style="display:none">
    <h2>⚙️ Settings</h2>

    <div class="ayar-blok">
      <p class="ayar-baslik">🎨 Theme</p>
      <div id="skin-liste" class="btn-grup"></div>
    </div>

    <div class="ayar-blok">
      <p class="ayar-baslik">🏁 First to win</p>
      <div class="btn-grup">
        <button class="dil-btn round-btn skin-aktif" data-round="3">3</button>
        <button class="dil-btn round-btn" data-round="5">5</button>
        <button class="dil-btn round-btn" data-round="7">7</button>
        <button class="dil-btn round-btn" data-round="10">10</button>
      </div>
    </div>

    <div id="zorluk-bolumu" class="ayar-blok" style="display:none">
      <p class="ayar-baslik">🤖 AI Difficulty</p>
      <div class="btn-grup">
        <button class="dil-btn zorluk-btn" data-zorluk="easy">😊 Easy</button>
        <button class="dil-btn zorluk-btn skin-aktif" data-zorluk="medium">😐 Medium</button>
        <button class="dil-btn zorluk-btn" data-zorluk="hard">😈 Hard</button>
      </div>
    </div>

    <div class="ayar-blok">
      <p class="ayar-baslik">✨ Special Mode</p>
      <div class="btn-grup">
        <button class="dil-btn ozelmod-btn skin-aktif" data-mod="normal">✅ Normal</button>
        <button class="dil-btn ozelmod-btn" data-mod="reverse">🔄 Reverse</button>
        <button class="dil-btn ozelmod-btn" data-mod="random">🎲 Random</button>
      </div>
    </div>

    <button class="devam-btn" onclick="ayarlariOnayla()">Next ▶</button>
  </div>

  <!-- İSİM SEÇİMİ -->
  <div id="isim-secim" class="ekran" style="display:none">
    <h2 id="isim-baslik">Enter your names</h2>
    <input type="text" id="isim1" placeholder="Player 1" maxlength="12">
    <input type="text" id="isim2" placeholder="Player 2" maxlength="12">
    <button class="devam-btn" id="btn-isim-onayla" onclick="isimleriOnayla()">Start 🎮</button>
  </div>

  <!-- OYUN -->
  <div id="oyun" style="display:none; text-align:center; width:100%; padding: 10px 0;">
    <div id="mod-rozeti" style="font-size:1rem;color:#ffed00;min-height:1.2rem;"></div>
    <h1 id="baslik">Rock Paper Scissors!</h1>
    <div style="display:flex;justify-content:center;gap:30px;font-size:0.95rem;opacity:0.8;margin-bottom:4px;">
      <span id="isim-etiket1"></span>
      <span id="isim-etiket2"></span>
    </div>
    <h2 id="tur">👤 Player 1, choose!</h2>
    <div id="sure-bar"></div>
    <p id="sure-yazi">8</p>
    <div id="skor">
      <span id="skor1">0</span>
      <span id="orta-cizgi">|</span>
      <span id="skor2">0</span>
    </div>
    <div id="butonlar">
      <button onclick="sec('tas')"><span id="btn-tas">🪨 Rock</span></button>
      <button onclick="sec('kagit')"><span id="btn-kagit">📄 Paper</span></button>
      <button onclick="sec('makas')"><span id="btn-makas">✂️ Scissors</span></button>
    </div>
    <button id="btn-dil-degistir" onclick="dilDegistir()">🌐 Change Language</button>
  </div>

  <h2 id="sonuc" style="text-align:center;padding:0 15px;"></h2>
  <div id="konfeti-katman"></div>

  <script src="./script.js"></script>
</body>
</html>
